<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Tablas de Multiplicar</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        input {
            padding: 10px;
            width: 80%;
            border: 2px solid #ddd;
            border-radius: 6px;
            margin-bottom: 1rem;
            font-size: 1rem;
        }

        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        #resultado {
            margin-top: 2rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .tabla-card {
            background: #fff;
            border-left: 5px solid #007bff;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            min-width: 150px;
        }

        .tabla-card h3 {
            margin-top: 0;
            color: #333;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }

        .linea-tabla {
            font-family: monospace;
            font-size: 1.1rem;
            margin: 3px 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Multiplicador Maestro</h2>
        <p>Ingresa un número para generar las tablas:</p>
        <input type="number" id="numeroUsuario" placeholder="Ej. 5" min="1">
        <br>
        <button onclick="generarTablas()">Generar Tablas</button>
    </div>

    <div id="resultado">
        </div>

    <script>
        function generarTablas() {
            const input = document.getElementById('numeroUsuario');
            const contenedor = document.getElementById('resultado');
            const n = parseInt(input.value);

            // Limpiar resultados previos
            contenedor.innerHTML = '';

            // Validación simple
            if (isNaN(n) || n <= 0) {
                alert("Por favor, introduce un número entero positivo.");
                return;
            }

            // Ciclo principal: Genera cada tabla desde el 1 hasta n
            for (let i = 1; i <= n; i++) {
                
                // Crear un contenedor visual para cada tabla (Card)
                let card = document.createElement('div');
                card.className = 'tabla-card';
                
                let titulo = `<h3>Tabla del ${i}</h3>`;
                let contenidoTabla = '';

                // Ciclo anidado: Genera las multiplicaciones del 1 al 10 para la tabla actual
                for (let j = 1; j <= 10; j++) {
                    contenidoTabla += `<div class="linea-tabla">${i} x ${j} = <b>${i * j}</b></div>`;
                }

                card.innerHTML = titulo + contenidoTabla;
                contenedor.appendChild(card);
            }
        }
    </script>

</body>
</html>
