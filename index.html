<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIM UAS</title>

<style>
    


*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}



.navbar{
    background-color:#003366;
    height:60px;
    display:flex;
    align-items:center;
    padding:0 20px;
    position:relative;
}


.logo{
    color:white;
    font-size:1.5rem;
    font-weight:bold;
    margin-left:15px;
}

/* Botón hamburguesa */
.menu-btn{
    cursor:pointer;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    height:20px;
}

.menu-btn span{
    display:block;
    width:25px;
    height:3px;
    background:white;
    border-radius:2px;
}


.menu{
    position:absolute;
    top:60px;
    left:0;
    width:200px;
    background-color:#002244;
    display:none;
    padding:20px;
}


.menu.active{
    display:block;
}

</style>
</head>

<body>

<header class="navbar">
    
    <!-- Botón hamburguesa -->
    <div class="menu-btn" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div class="logo">FIM UAS</div>

</header>


<div class="menu">
</div>

<script>
function toggleMenu(){
    document.querySelector(".menu").classList.toggle("active");
}
</script>

</body>
 
</html>
